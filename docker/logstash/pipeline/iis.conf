input {
  file {
    path => "/usr/share/logstash/sample-logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    exit_after_read => false
  }
}

filter {
  if [message] =~ /^#/ {
    drop { }
  }

  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{IPORHOST:s_ip} %{WORD:cs_method} %{URIPATH:cs_uri_stem} %{NOTSPACE:cs_uri_query} %{NUMBER:s_port:int} %{NOTSPACE:cs_username} %{IPORHOST:c_ip} %{NOTSPACE:cs_user_agent} %{NUMBER:sc_status:int} %{NUMBER:sc_substatus:int} %{NUMBER:sc_win32_status:int} %{NUMBER:time_taken:int}"
    }
  }

  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss"]
    timezone => "UTC"
    target => "@timestamp"
  }

  mutate {
    add_field => {
      "event.dataset" => "iis.access"
      "service.name" => "iis"
    }
    remove_field => ["host", "log", "log_timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "iis-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
